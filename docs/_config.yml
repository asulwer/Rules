# GitHub Pages Jekyll Configuration
title: Rules Engine
description: High-performance .NET rules engine with Roslyn compilation
baseurl: "/Rules"
url: "https://asulwer.github.io"

# Use GitHub Pages supported theme
theme: jekyll-theme-cayman

# Navigation structure
nav_external_links:
  - title: GitHub
    url: https://github.com/asulwer/Rules
    hide_icon: false

# Search enabled
search_enabled: true

# Color scheme
color_scheme: dark

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
