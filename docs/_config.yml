# GitHub Pages Jekyll Configuration
title: RoslynRules
description: High-performance .NET rules engine with Roslyn compilation
baseurl: "/RoslynRules"
url: "https://asulwer.github.io"

# Use just-the-docs via remote_theme (GitHub Pages supports this)
remote_theme: just-the-docs/just-the-docs@v0.10.0

# Navigation structure
nav_external_links:
  - title: GitHub
    url: https://github.com/asulwer/RoslynRules
    hide_icon: false

# Search enabled
search_enabled: true
search.button: true

# Color scheme
color_scheme: dark

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Footer
footer_content: "MIT License. Built with Roslyn + Typed Delegates."

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
