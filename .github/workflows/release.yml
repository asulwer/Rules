name: Build and Publish NuGet Packages

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write      # For creating GitHub releases
  id-token: write      # Required for Trusted Publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Pack RoslynRules
        run: dotnet pack './RoslynRules/RoslynRules.csproj' --configuration Release --no-build --output ./nuget_packages

      - name: Pack RoslynRules.EntityFrameworkCore
        run: dotnet pack './RoslynRules.EntityFrameworkCore/RoslynRules.EntityFrameworkCore.csproj' --configuration Release --no-build --output ./nuget_packages

      - name: Pack RoslynRules.Json
        run: dotnet pack './RoslynRules.Json/RoslynRules.Json.csproj' --configuration Release --no-build --output ./nuget_packages

      - name: Publish NuGet packages to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push ./nuget_packages/*.nupkg -k $NUGET_API_KEY -s https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./nuget_packages/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
